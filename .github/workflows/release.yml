name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          echo "Generating changelog from $PREV_TAG to $CURRENT_TAG"
          # Generate changelog from git log
          CHANGELOG=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges)
          # Handle multi-line output for GitHub Actions
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Build app
        env:
          APP_VERSION: ${{ steps.get_version.outputs.VERSION }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          xcodebuild -project PrayerTimes.xcodeproj \
            -scheme PrayerTimes \
            -configuration Release \
            -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Create DMG
        env:
          APP_VERSION: ${{ steps.get_version.outputs.VERSION }}
          BUILD_NUMBER: ${{ github.run_number }}
          SKIP_BUILD: true
          CI: true
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh "$APP_VERSION" "$BUILD_NUMBER"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PrayerTimes ${{ steps.get_version.outputs.VERSION }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ---

            ### Installation
            1. Download `PrayerTimes-${{ steps.get_version.outputs.VERSION }}.dmg`
            2. Open the DMG and drag **PrayerTimes** to **Applications**
            3. **First launch:** Right-click the app → select **Open** → click **Open** in the dialog

            > **Tip:** If macOS blocks the app, run in Terminal: `xattr -r -d com.apple.quarantine /Applications/PrayerTimes.app`
          files: |
            release/PrayerTimes-${{ steps.get_version.outputs.VERSION }}.dmg
            release/PrayerTimes-${{ steps.get_version.outputs.VERSION }}.dmg.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PrayerTimes-${{ steps.get_version.outputs.VERSION }}
          path: release/PrayerTimes-${{ steps.get_version.outputs.VERSION }}.dmg

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          SHA256=$(awk '{print $1}' "release/PrayerTimes-${VERSION}.dmg.sha256")

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/abd3lraouf/homebrew-prayertimes.git" tap-repo
          cd tap-repo

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/prayertimes.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/prayertimes.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/prayertimes.rb
          git commit -m "Update PrayerTimes to ${VERSION}"
          git push
